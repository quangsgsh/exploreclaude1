<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VnSports · Tin thể thao mới nhất</title>
    <meta name="description" content="Đọc nhanh tin thể thao mới nhất từ VnExpress." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400..800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="masthead">
      <div class="masthead-inner">
        <div class="brand">
          <span class="brand-mark">VNS</span>
          <div class="brand-meta">
            <h1>VnSports</h1>
            <p>Tin thể thao mới nhất · nguồn VnExpress</p>
          </div>
        </div>
        <div class="masthead-side">
          <span class="clock" id="clock">—</span>
          <button id="refresh" class="btn-refresh" aria-label="Làm mới">
            <span class="refresh-icon">↻</span>
            <span>Làm mới</span>
          </button>
        </div>
      </div>
      <nav class="tabs" id="tabs" aria-label="Thể loại"></nav>
    </header>

    <main>
      <section class="hero" id="hero" aria-live="polite"></section>
      <section class="grid-head">
        <h2>Tin mới hơn</h2>
        <span class="grid-count" id="count">—</span>
      </section>
      <section class="grid" id="grid" aria-live="polite"></section>
      <p class="status" id="status"></p>
    </main>

    <footer>
      <p>
        Dữ liệu từ
        <a href="https://vnexpress.net/the-thao" target="_blank" rel="noopener"
          >vnexpress.net/the-thao</a
        >
        · Cập nhật mỗi 15 phút · Hosted trên GitHub Pages
      </p>
    </footer>

    <script src="./app.js" type="module"></script>
  </body>
</html>
